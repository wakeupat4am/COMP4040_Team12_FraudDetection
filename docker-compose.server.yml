services:
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    command:
      [
        "mlflow",
        "server",
        "--backend-store-uri",
        "sqlite:////mlflow/mlflow.db",
        "--default-artifact-root",
        "/mlflow/artifacts",
        "--host",
        "0.0.0.0",
        "--port",
        "5000",
      ]
    volumes:
      - /datamining/mlflow:/mlflow
    ports:
      - "127.0.0.1:5001:5000"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      - mlflow
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CLERK_JWT_KEY: ${CLERK_JWT_KEY:-}
      CLERK_PEM_PUBLIC_KEY: ${CLERK_PEM_PUBLIC_KEY:-}
      CLERK_JWT_ALGORITHMS: ${CLERK_JWT_ALGORITHMS:-RS256}
      CLERK_ISSUER: ${CLERK_ISSUER:-}
      CLERK_AUDIENCE: ${CLERK_AUDIENCE:-}
      BOOTSTRAP_HISTORY: ${BOOTSTRAP_HISTORY:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      ANALYST_USERNAME: ${ANALYST_USERNAME:-analyst}
      ANALYST_CLERK_USER_ID: ${ANALYST_CLERK_USER_ID:-}
      MANAGER_USERNAME: ${MANAGER_USERNAME:-admin}
      MANAGER_CLERK_USER_ID: ${MANAGER_CLERK_USER_ID:-}
      MLFLOW_ENABLED: ${MLFLOW_ENABLED:-true}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-fraud-detection-production}
      MLFLOW_MODEL_RUN_ID: ${MLFLOW_MODEL_RUN_ID:-}
    ports:
      - "127.0.0.1:8010:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
