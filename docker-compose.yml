services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles:
      - local
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fraud_ops}
      POSTGRES_USER: ${POSTGRES_USER:-fraud_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fraud_app_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fraud_app} -d ${POSTGRES_DB:-fraud_ops}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://fraud_app:fraud_app_password@postgres:5432/fraud_ops}
      CLERK_JWT_KEY: ${CLERK_JWT_KEY:-}
      CLERK_JWT_ALGORITHMS: ${CLERK_JWT_ALGORITHMS:-RS256}
      CLERK_ISSUER: ${CLERK_ISSUER:-}
      CLERK_AUDIENCE: ${CLERK_AUDIENCE:-}
      BOOTSTRAP_HISTORY: ${BOOTSTRAP_HISTORY:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      ANALYST_USERNAME: ${ANALYST_USERNAME:-analyst}
      ANALYST_CLERK_USER_ID: ${ANALYST_CLERK_USER_ID:-}
      MANAGER_USERNAME: ${MANAGER_USERNAME:-admin}
      MANAGER_CLERK_USER_ID: ${MANAGER_CLERK_USER_ID:-}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
